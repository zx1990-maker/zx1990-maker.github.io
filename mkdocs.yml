# [界面与高级主题美化]
theme:
  name: material
  language: zh  # 界面汉化
  palette:
    # 日间模式
    - scheme: default
      primary: indigo
      accent: orange
      toggle:
        icon: material/weather-night
        name: 切换至夜间模式
    # 夜间模式
    - scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: 切换至日间模式
  features:
    - navigation.tabs      # 顶部横向大 Tab 分类栏
    - navigation.top       # 自动回到顶部按钮
    - navigation.indexes   # 分类允许拥有单独的首页
    - navigation.expand    # 左侧侧边栏目录自动展开
    - search.suggest       # 搜索智能提示
    - search.highlight     # 搜索关键词高亮
    - content.code.copy    # 代码块一键复制按钮

# [插件与 Markdown 语法扩展扩展支持]
plugins:
  - search:
      lang: [zh, en]       # 完美支持中文、英文全局实时搜索
markdown_extensions:
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      linenums: true       # 代码块显示行号
      auto_title: true     # 代码自动识别语言名称
  - pymdownx.superfences
  - admonition             # 支持炫酷的高亮提示框
  - pymdownx.details       # 支持原生折叠面板
# 核心：加入 Markdown 扩展插件
markdown_extensions:
  # 1. 支持标准表格（笔记中的对比表格需要它）
  - tables
  
  # 2. 支持数学公式 (LaTeX) 的核心扩展
  - pymdownx.arithmatex:
      generic: true

  # 3. 支持高级代码块高亮（让你的 md 代码框更好看）
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

# 核心：为了让数学公式在网页上真正渲染出来，需要引入 MathJax 脚本
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
